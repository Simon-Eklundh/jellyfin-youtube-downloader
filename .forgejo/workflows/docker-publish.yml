name: Publish Docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker debug
        run: |
          docker version
          cat ~/.docker/config.json 2>/dev/null || echo "no docker config present"
      - name: Debug secret length
        run: |
          echo "DOCKERHUB_TOKEN length:"
          echo -n "${{ secrets.DOCKERHUB_TOKEN }}" | wc -c
          echo "DOCKERHUB_USERNAME length:"
          echo -n "${{ secrets.DOCKERHUB_USERNAME }}" | wc -c
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jellyfin-youtube-backuper:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jellyfin-youtube-backuper:${{ github.sha }}