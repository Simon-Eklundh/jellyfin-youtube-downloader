name: Publish Docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        run: |
          mkdir -p ~/.docker
          AUTH=$(printf '%s:%s' "${{ secrets.DOCKERHUB_USERNAME }}" "${{ secrets.DOCKERHUB_TOKEN }}" | base64 -w0)
          cat > ~/.docker/config.json <<EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jellyfin-youtube-backuper:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jellyfin-youtube-backuper:${{ github.sha }}